name: spec-driven
version: 1
description: Default OpenSpec workflow - proposal → design → tasks → specs
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Problem**: What's broken or missing. Why it matters. 1-2 paragraphs.
      - **Constraints**: Hard boundaries, technical limits, what can't change.
      - **Success Criteria**: Observable outcomes when done. User-visible statements
        that are true when the change is complete.
      - **Non-goals**: What we're explicitly not building. Scope boundaries.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" —
      implementation details belong in design.md.

      This is the foundation — design, tasks, and specs all build on this.
    requires: []

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Overview**: One paragraph. What this design achieves and why.
      - **Architecture**: Diagrams, data flow, system structure. How the pieces
        fit together.
      - **Detailed Design**: Organized by concept — data models, APIs, integration
        points, algorithms. Use subsections freely.
      - **Non-goals**: What this design explicitly avoids.

      Optional sections:
      - **Decisions**: Key technical choices with rationale, when they need to stay
        visible in the blueprint. For exploratory Q&A, use decisions.md instead.

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation.

      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation task list with descriptions and acceptance criteria
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      Format each task as a heading:
      ```
      ### Task N: Name (type)
      ```
      where `type` is `feature`, `refactoring`, `test`, `docs`, or similar.

      Each task should include:
      - A description of what to implement, where, and why
      - **Files:** list of file paths affected
      - **Acceptance criteria:** bullet list of verifiable outcomes

      Guidelines:
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)
      - Each task should be independently verifiable

      Example:
      ```
      ### Task 1: Add user export endpoint (feature)

      Add a new REST endpoint for exporting user data as CSV.

      **Files:** `src/routes/export.ts`, `src/services/csv.ts`
      **Acceptance criteria:**
      - GET /api/export returns 200 with CSV content-type
      - CSV includes all user profile fields
      - Unauthorized requests return 401
      ```

      Reference the proposal for what needs to be built, design for how to build it.
    requires:
      - design

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Specs use prose blocks organized under `##` sections with `###` headings:
      - Each `##` heading names a section (e.g., `## Behavior`, `## Data Model`)
      - Each `###` heading names a block within that section
      - Block content is plain prose describing the behavior

      Delta operations target sections by name:
      - **`## ADDED {Section}`**: New blocks for a section. Creates the section
        if it doesn't exist in the target spec.
      - **`## MODIFIED {Section}`**: Updated blocks. MUST include the full updated
        content — partial content loses detail at archive time.
      - **`## REMOVED {Section}`**: Blocks to remove. Include **Reason** and
        **Migration** under each block.
      - **`## RENAMED {Section}`**: Name changes only. Use canonical format:
        ```
        FROM: ### Old Name
        TO: ### New Name
        ```
        A RENAMED section may contain multiple rename entries as repeated
        FROM:/TO: pairs, optionally separated by blank lines.

      MODIFIED blocks workflow:
      1. Locate the existing block in openspec/specs/<capability>/spec.md
      2. Copy the ENTIRE block (from `###` heading through all content)
      3. Paste under `## MODIFIED {Section}` and edit to reflect new behavior
      4. Ensure heading text matches exactly (whitespace-insensitive)

      Example:
      ```
      ## ADDED Behavior

      ### User can export data
      Users can export their profile data as a CSV file. The export
      includes all profile fields and is available from the account
      settings page.

      ## REMOVED Behavior

      ### Legacy export
      **Reason**: Replaced by new export system
      **Migration**: Use new export endpoint at /api/v2/export
      ```

      Specs should be testable — each block describes verifiable behavior.
    requires:
      - tasks

  - id: decisions
    generates: decisions.md
    description: Q&A record from the exploration and proposal phase
    template: decisions.md
    instruction: |
      Record questions and answers from the exploration phase.

      Format as Q&A entries grouped by topic:
      - Each `##` heading names a topic
      - **Q:** states the question
      - List the options considered (bold the chosen option)
      - **A:** states the answer with rationale

      Example:
      ```
      ## Authentication strategy

      **Q:** Should we use JWT or session cookies?

      - JWT — stateless, works across services
      - **Session cookies** — simpler, better security defaults
      - OAuth tokens — overkill for internal service

      **A:** Session cookies. We only have one service today and the
      security team prefers server-side session management.
      ```

      This artifact is optional. Use it during proposal/exploration to
      capture decisions that inform the proposal but don't belong in it.
    requires: []

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
